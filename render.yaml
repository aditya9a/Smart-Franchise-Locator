services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: franchise-locator-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false       # You will fill this in the Render dashboard
      - key: JWT_SECRET
        sync: false       # You will fill this in the Render dashboard

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: franchise-locator-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false       # Set to your backend URL: https://franchise-locator-api.onrender.com/api
